<!DOCTYPE html>
<html lang="ms" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Koleksi E-Book Anak Lancar Baca</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { brand: { 50: '#f0fdf4', 100: '#dcfce7', 500: '#22c55e', 600: '#16a34a', 700: '#15803d', 900: '#14532d' } } } }
    }
  </script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .gradient-bg { background: radial-gradient(circle at 50% 0%, #1e1b4b 0%, #0f0b36 100%); }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased min-h-screen flex flex-col">

  <section class="gradient-bg text-white pt-10 pb-12 px-4 relative overflow-hidden">
    <div class="absolute inset-0 bg-[radial-gradient(circle_at_30%_30%,rgba(34,197,94,0.12),transparent_50%)]"></div>
    <div class="max-w-6xl mx-auto grid md:grid-cols-2 gap-8 items-center relative z-10">
      <div class="text-center md:text-left">
        <span class="inline-flex items-center gap-1.5 bg-brand-500/10 text-brand-400 px-4 py-1.5 rounded-full text-xs font-semibold mb-4 border border-brand-500/20">
          <i data-lucide="sparkles" class="w-3.5 h-3.5 animate-pulse"></i> Siri Bacaan Kanak-Kanak
        </span>
        <h1 class="text-4xl md:text-6xl font-extrabold tracking-tight leading-tight">
          Anak Lebih Cepat <span class="text-transparent bg-clip-text bg-gradient-to-r from-brand-400 to-emerald-300">Lancar Membaca</span>
        </h1>
        <p class="mt-4 text-base md:text-lg text-slate-300 max-w-xl mx-auto md:mx-0 font-light">
          E-book bacaan berperingkat untuk membantu anak mengenal huruf, suku kata, perkataan, ayat pendek dan membaca dengan lebih yakin.
        </p>
        <div class="mt-6 flex flex-wrap justify-center md:justify-start gap-3">
          <a href="#katalog" class="bg-brand-600 hover:bg-brand-700 text-white font-bold px-7 py-3.5 rounded-xl transition-all shadow-lg shadow-brand-600/20">Lihat E-Book</a>
        </div>
      </div>
      <div class="relative flex justify-center">
        <div class="w-64 h-64 bg-brand-500/20 rounded-full blur-3xl absolute"></div>
        <div class="bg-white/10 border border-white/10 rounded-3xl p-2 shadow-2xl backdrop-blur">
            <img src="https://sites.google.com/view/5-langkah-untuk-anak-cepat-mem/home" alt="Poster E-book" class="w-72 md:w-80 h-96 object-cover rounded-2xl" onerror="this.onerror=null;this.src='https://placehold.co/320x400/15803d/white?text=Imej+Tidak+Dijumpai'">
        </div>
      </div>
    </div>
  </section>

  <section id="katalog" class="max-w-7xl mx-auto px-4 py-20">
    <div class="text-center mb-12">
      <h2 class="text-3xl font-bold">Katalog</h2>
    </div>
    <div id="ebooksGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
  </section>

  <script>
    const EBOOKS_DATA = [
      { id: "semut", title: "SEMUT YANG RAJIN", desc: "Kisah tauladan mengajar anak-anak tentang nilai kerajinan.", price: 5.90, category: "Kanak-kanak", colorClass: "from-emerald-500 to-green-600", icon: "bug", coverImg: "" }
    ];

    function renderEbooks() {
      // Pembetulan: Menggunakan getElementById yang betul
      const grid = document.getElementById('ebooksGrid');
      if (!grid) return;
      
      grid.innerHTML = EBOOKS_DATA.map(book => `
        <div class="bg-white border rounded-3xl shadow-lg p-6 flex flex-col">
          <div class="h-40 bg-gradient-to-br ${book.colorClass} rounded-xl flex items-center justify-center mb-4 overflow-hidden">
            ${book.coverImg ? `<img src="${book.coverImg}" class="w-full h-full object-cover">` : `<i data-lucide="${book.icon}" class="w-12 h-12 text-white"></i>`}
          </div>
          <h3 class="font-bold text-lg">${book.title}</h3>
          <p class="text-sm text-slate-500 mt-2 flex-1">${book.desc}</p>
          <div class="mt-4 pt-4 border-t font-bold text-xl">RM ${book.price.toFixed(2)}</div>
        </div>
      `).join('');
      lucide.createIcons();
    }

    window.onload = () => { renderEbooks(); };
  </script>
</body>
</html>
